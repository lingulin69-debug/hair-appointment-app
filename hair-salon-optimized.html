<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美髮院預約管理系統 - 單機打包版</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel 轉換器 (讓瀏覽器看得懂 React JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- ES Modules 模組對照表 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0",
        "firebase/app": "https://esm.sh/firebase@10.7.1/app",
        "firebase/firestore": "https://esm.sh/firebase@10.7.1/firestore",
        "firebase/auth": "https://esm.sh/firebase@10.7.1/auth"
      }
    }
  </script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #EBE6DC;
    }
    .force-serif * { 
      font-family: 'Noto Serif TC', serif !important; 
      letter-spacing: 0.05em; 
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(74,59,50,0.2); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="force-serif">

  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc } from 'firebase/firestore';
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
    import { AlertTriangle, X, ChevronLeft, ChevronRight, Search, Plus, Calculator, ArrowRight, CheckCircle2, Circle, TrendingUp, CalendarX2, PhoneCall, Package, Scissors } from 'lucide-react';

    // --- Firebase 配置 ---
    let firebaseConfig;
    try {
      if (typeof __firebase_config !== 'undefined') {
        firebaseConfig = JSON.parse(__firebase_config);
      } else {
        throw new Error();
      }
    } catch(e) {
      firebaseConfig = {
        apiKey: "請替換為您的API_KEY",
        authDomain: "請替換為您的PROJECT_ID.firebaseapp.com",
        projectId: "請替換為您的PROJECT_ID",
        storageBucket: "請替換為您的PROJECT_ID.appspot.com",
        messagingSenderId: "請替換",
        appId: "請替換"
      };
      console.warn("目前使用本地預設 Firebase 設定,請更新為您的真實金鑰以免無法存取資料。");
    }

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'hair-salon-manager-local';

    const TIME_SLOTS = Array.from({ length: 11 }, (_, i) => `${i + 10}:00`); 
    const DAYS_OF_WEEK = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    const DEFAULT_STORE_ITEMS = [
      { name: '剪髮', price: 600, duration: '1 HR', type: 'service' },
      { name: '洗髮', price: 300, duration: '0.5 HR', type: 'service' },
      { name: '染髮', price: 2500, duration: '3 HR', type: 'service' },
      { name: '燙髮', price: 3000, duration: '3.5 HR', type: 'service' },
      { name: '深層護髮素', price: 800, duration: '-', type: 'product' },
      { name: '定型噴霧', price: 450, duration: '-', type: 'product' }
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [appointments, setAppointments] = useState([]);
      const [clients, setClients] = useState([]);
      const [revenues, setRevenues] = useState([]);
      const [leaves, setLeaves] = useState([]);
      const [storeItems, setStoreItems] = useState([]); 
      
      const [currentView, setCurrentView] = useState('calendar');
      const [currentMonthDate, setCurrentMonthDate] = useState(new Date()); 
      const [activeAppointment, setActiveAppointment] = useState(null); 
      const [selectedDateStr, setSelectedDateStr] = useState(''); 
      
      const [activeClient, setActiveClient] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      
      const [isNewApptModalOpen, setIsNewApptModalOpen] = useState(false);     
      const [isClientModalOpen, setIsClientModalOpen] = useState(false);
      const [isMobileDetailOpen, setIsMobileDetailOpen] = useState(false);
      const [isItemModalOpen, setIsItemModalOpen] = useState(false);
      const [isCalcOpen, setIsCalcOpen] = useState(false);

      const [calcDisplay, setCalcDisplay] = useState('0');
      const [calcEquation, setCalcEquation] = useState('');
      const [calcMemory, setCalcMemory] = useState(null);
      const [calcOperator, setCalcOperator] = useState(null);
      const [calcWaitingForNewValue, setCalcWaitingForNewValue] = useState(false);

      const [dialPhone, setDialPhone] = useState(null);
      const [dialCountdown, setDialCountdown] = useState(0);

      const [tempClientName, setTempClientName] = useState('');
      const [tempTime, setTempTime] = useState('10:00');
      const [tempService, setTempService] = useState('剪髮');
      const [tempPax, setTempPax] = useState(1);
      const [tempNotes, setTempNotes] = useState('');
      
      const [tempClientData, setTempClientData] = useState({ name: '', phone: '', preference: '', product: '' });
      const [tempItemData, setTempItemData] = useState({ name: '', price: '', duration: '', type: 'service' });

      // 優化: 使用 useEffect 初始化認證
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) { 
            console.error("Auth failed", err); 
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // 優化: Firebase 監聽器整合,避免重複訂閱
      useEffect(() => {
        if (!user) return;
        
        const unsubscribers = [];
        
        // 預約資料監聽
        unsubscribers.push(
          onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'appointments'), 
            (snap) => {
              const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
              setAppointments(data);
            },
            (error) => console.error("Error fetching appointments:", error)
          )
        );
        
        // 顧客資料監聽
        unsubscribers.push(
          onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), 
            (snap) => {
              const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
              data.sort((a, b) => a.name.localeCompare(b.name));
              setClients(data);
            },
            (error) => console.error("Error fetching clients:", error)
          )
        );
        
        // 營收資料監聽
        unsubscribers.push(
          onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'revenues'), 
            (snap) => {
              const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
              setRevenues(data);
            },
            (error) => console.error("Error fetching revenues:", error)
          )
        );
        
        // 休假資料監聽
        unsubscribers.push(
          onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'leaves'), 
            (snap) => {
              const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
              setLeaves(data);
            },
            (error) => console.error("Error fetching leaves:", error)
          )
        );
        
        // 商品服務監聽
        unsubscribers.push(
          onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'storeItems'), 
            async (snap) => {
              if (snap.empty) {
                try {
                  for (let item of DEFAULT_STORE_ITEMS) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'storeItems'), item);
                  }
                } catch (error) {
                  console.error("Error initializing store items:", error);
                }
              } else {
                const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                setStoreItems(data);
              }
            },
            (error) => console.error("Error fetching store items:", error)
          )
        );

        return () => unsubscribers.forEach(unsub => unsub());
      }, [user]);

      // 優化: 電話撥打倒數計時
      useEffect(() => {
        if (dialCountdown > 0 && dialPhone) {
          const timer = setTimeout(() => setDialCountdown(prev => prev - 1), 1000);
          return () => clearTimeout(timer);
        } else if (dialCountdown === 0 && dialPhone) {
          window.location.href = `tel:${dialPhone}`;
          setDialPhone(null);
        }
      }, [dialCountdown, dialPhone]);

      // 優化: 日曆資料生成
      const calendarData = useMemo(() => {
        const year = currentMonthDate.getFullYear();
        const month = currentMonthDate.getMonth();
        const firstDay = new Date(year, month, 1).getDay(); 
        const daysInMonth = new Date(year, month + 1, 0).getDate(); 
        const days = [];
        for (let i = 0; i < firstDay; i++) days.push(null);
        for (let i = 1; i <= daysInMonth; i++) {
          days.push(`${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`);
        }
        return days;
      }, [currentMonthDate]);

      const todayStr = useMemo(() => new Date().toISOString().split('T')[0], []);

      // 優化: 選中的顧客資訊
      const selectedClientInfo = useMemo(() => {
        if (currentView === 'clients') return activeClient;
        if (!activeAppointment) return null;
        return clients.find(c => c.id === activeAppointment.clientId);
      }, [activeAppointment, activeClient, clients, currentView]);

      // 優化: 輸入時匹配的顧客
      const typingMatchedClient = useMemo(() => {
        if (!tempClientName.trim()) return null;
        return clients.find(c => c.name === tempClientName.trim());
      }, [tempClientName, clients]);

      // 優化: 月度營收資料
      const monthlyRevenueData = useMemo(() => {
        const data = {};
        revenues.forEach(rev => {
          const monthStr = rev.date.substring(0, 7);
          data[monthStr] = (data[monthStr] || 0) + rev.amount;
        });
        return Object.entries(data)
          .map(([month, amount]) => ({ month, amount }))
          .sort((a, b) => a.month.localeCompare(b.month))
          .slice(-6);
      }, [revenues]);

      // 優化: 使用 useCallback 避免不必要的函數重建
      const initiateCall = useCallback((phone) => { 
        if (!phone) return; 
        setDialPhone(phone); 
        setDialCountdown(5); 
      }, []);

      const handleCheckout = useCallback((serviceName) => {
        const service = storeItems.find(s => s.name === serviceName);
        if (service) {
          setCalcDisplay(service.price.toString());
          setCalcEquation(`結帳: ${serviceName}`);
          setCalcWaitingForNewValue(true);
          setIsCalcOpen(true);
        }
      }, [storeItems]);

      const handleSaveRevenue = useCallback(async () => {
        if (!user) return;
        const amount = parseFloat(calcDisplay);
        if (isNaN(amount) || amount <= 0) return;
        try {
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'revenues'), { 
            amount, 
            date: todayStr, 
            timestamp: new Date().toISOString() 
          });
          setCalcDisplay('0'); 
          setCalcEquation('');
          setCalcMemory(null);
          setCalcOperator(null);
          setCalcWaitingForNewValue(false);
          setIsCalcOpen(false);
        } catch (error) {
          console.error("Error saving revenue:", error);
        }
      }, [user, calcDisplay, todayStr]);

      const handleToggleLeave = useCallback(async (dateStr) => {
        if (!user) return;
        try {
          const existingLeave = leaves.find(l => l.date === dateStr);
          if (existingLeave) {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'leaves', existingLeave.id));
          } else {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'leaves'), { date: dateStr });
          }
        } catch (error) {
          console.error("Error toggling leave:", error);
        }
      }, [user, leaves]);

      // 優化: 計算機邏輯
      const calculateResult = useCallback((nextOperator = null) => {
        const inputValue = parseFloat(calcDisplay);
        let result = 0;
        if (calcMemory === null) return;
        
        switch(calcOperator) {
          case '+': result = calcMemory + inputValue; break;
          case '−': result = calcMemory - inputValue; break;
          case '×': result = calcMemory * inputValue; break;
          case '÷': 
            if (inputValue === 0) {
              setCalcDisplay('Error');
              setCalcMemory(null);
              setCalcOperator(null);
              return;
            }
            result = calcMemory / inputValue; 
            break;
          default: return;
        }
        
        result = Math.round(result * 10000) / 10000;
        setCalcDisplay(result.toString()); 
        setCalcMemory(result);
        
        if (nextOperator) { 
          setCalcOperator(nextOperator); 
          setCalcWaitingForNewValue(true); 
          setCalcEquation(`${result} ${nextOperator}`); 
        }
      }, [calcDisplay, calcMemory, calcOperator]);

      const handleCalcInput = useCallback((value) => {
        if (calcDisplay === 'Error') {
          setCalcDisplay('0');
          setCalcEquation('');
          setCalcMemory(null);
          setCalcOperator(null);
          setCalcWaitingForNewValue(false);
          return;
        }

        if (/\d/.test(value)) {
          if (calcWaitingForNewValue) { 
            setCalcDisplay(value); 
            setCalcWaitingForNewValue(false); 
          } else { 
            setCalcDisplay(calcDisplay === '0' ? value : calcDisplay + value); 
          }
        } else if (value === 'AC') {
          setCalcDisplay('0'); 
          setCalcEquation(''); 
          setCalcMemory(null); 
          setCalcOperator(null); 
          setCalcWaitingForNewValue(false);
        } else if (value === '.') {
          if (!calcDisplay.includes('.')) {
            setCalcDisplay(calcDisplay + '.');
          }
        } else if (value === '+/-') {
          const num = parseFloat(calcDisplay);
          if (!isNaN(num)) {
            setCalcDisplay((num * -1).toString());
          }
        } else if (value === '%') {
          const num = parseFloat(calcDisplay);
          if (!isNaN(num)) {
            setCalcDisplay((num / 100).toString());
          }
        } else if (['+', '−', '×', '÷'].includes(value)) {
          if (calcOperator && !calcWaitingForNewValue) {
            calculateResult(value);
          } else { 
            setCalcMemory(parseFloat(calcDisplay)); 
            setCalcOperator(value); 
            setCalcWaitingForNewValue(true); 
            setCalcEquation(`${calcDisplay} ${value}`); 
          }
        } else if (value === '=') {
          calculateResult(); 
          setCalcOperator(null); 
          setCalcWaitingForNewValue(true); 
          setCalcEquation('');
        }
      }, [calcDisplay, calcWaitingForNewValue, calcOperator, calculateResult]);

      const handleSaveAppt = useCallback(async () => {
        if (!user || !tempClientName.trim()) return;
        try {
          let targetClient = typingMatchedClient;
          if (!targetClient) {
            const newClientDoc = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), { 
              name: tempClientName.trim(), 
              phone: '', 
              preference: '', 
              product: '', 
              rescheduleCount: 0 
            });
            targetClient = { id: newClientDoc.id };
          }
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'appointments'), { 
            date: selectedDateStr, 
            time: tempTime, 
            clientId: targetClient.id, 
            service: tempService, 
            pax: tempPax, 
            notes: tempNotes 
          });
          // 重置表單
          setTempClientName('');
          setTempTime('10:00');
          setTempService('剪髮');
          setTempPax(1);
          setTempNotes('');
          setIsNewApptModalOpen(false);
        } catch (error) {
          console.error("Error saving appointment:", error);
        }
      }, [user, tempClientName, typingMatchedClient, selectedDateStr, tempTime, tempService, tempPax, tempNotes]);

      const handleSaveClient = useCallback(async () => {
        if (!user || !tempClientData.name.trim()) return;
        try {
          if (tempClientData.id) {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', tempClientData.id), { 
              name: tempClientData.name, 
              phone: tempClientData.phone, 
              preference: tempClientData.preference, 
              product: tempClientData.product 
            });
            setActiveClient({ ...activeClient, ...tempClientData });
          } else {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), { 
              name: tempClientData.name, 
              phone: tempClientData.phone, 
              preference: tempClientData.preference, 
              product: tempClientData.product, 
              rescheduleCount: 0 
            });
          }
          setIsClientModalOpen(false);
        } catch (error) {
          console.error("Error saving client:", error);
        }
      }, [user, tempClientData, activeClient]);

      const handleSaveStoreItem = useCallback(async () => {
        if (!user || !tempItemData.name.trim() || !tempItemData.price) return;
        try {
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'storeItems'), {
            name: tempItemData.name.trim(), 
            price: parseFloat(tempItemData.price), 
            duration: tempItemData.duration || '-', 
            type: tempItemData.type
          });
          // 重置表單
          setTempItemData({ name: '', price: '', duration: '', type: 'service' });
          setIsItemModalOpen(false);
        } catch (error) {
          console.error("Error saving store item:", error);
        }
      }, [user, tempItemData]);

      const openClientDetail = useCallback((client) => { 
        setActiveClient(client); 
        setIsMobileDetailOpen(true); 
      }, []);
      
      const openApptDetail = useCallback((appt) => { 
        setActiveAppointment(appt); 
        setIsMobileDetailOpen(true); 
      }, []);

      // 優化: 新增預約時重置表單
      const openNewApptModal = useCallback((dateStr) => {
        setSelectedDateStr(dateStr);
        setTempClientName('');
        setTempTime('10:00');
        setTempService(storeItems.find(i => i.type === 'service')?.name || '剪髮');
        setTempPax(1);
        setTempNotes('');
        setIsNewApptModalOpen(true);
      }, [storeItems]);

      // 優化: 篩選顧客
      const filteredClients = useMemo(() => {
        return clients.filter(c => c.name.includes(searchQuery));
      }, [clients, searchQuery]);

      return (
        <div className="flex flex-col h-[100dvh] bg-[#F4F0EA] text-[#4A3B32] force-serif selection:bg-[#4A3B32]/10 transition-colors duration-300">
          
          <div className="flex flex-col md:flex-row md:items-center justify-between px-4 md:px-10 py-4 md:h-[100px] border-b border-[#E2DCD0] bg-white/50 backdrop-blur-md shrink-0 gap-4 z-10">
            <div className="flex items-center justify-between">
              <div className="text-3xl text-[#4A3B32] tracking-widest font-black flex items-center">
                美髮院<span className="text-lg ml-3 text-[#8C7A6B] font-mono tracking-wider opacity-80">H.SALON</span>
              </div>
              <button onClick={() => setIsCalcOpen(true)} className="md:hidden p-2.5 rounded-full text-[#4A3B32] bg-white shadow-sm border border-[#E2DCD0]">
                <Calculator size={20} />
              </button>
            </div>
            
            <div className="flex space-x-2 overflow-x-auto pb-2 md:pb-0 scrollbar-hide hide-scrollbar w-full md:w-auto">
              {[
                { id: 'calendar', label: '預約日曆' }, { id: 'clients', label: '顧客目錄' },
                { id: 'services', label: '服務與商品' }, { id: 'dashboard', label: '營收休假' }
              ].map(view => {
                const isActive = currentView === view.id;
                return (
                  <button 
                    key={view.id} onClick={() => { setCurrentView(view.id); setActiveAppointment(null); setActiveClient(null); setIsMobileDetailOpen(false); }}
                    className={`px-5 py-2.5 rounded-full text-lg font-bold whitespace-nowrap transition-all duration-300 border ${isActive ? 'bg-[#4A3B32] text-[#FCFAF5] border-[#4A3B32] shadow-md shadow-[#4A3B32]/10' : 'bg-transparent text-[#4A3B32] border-transparent hover:bg-[#E2DCD0]/40'}`}
                  >
                    {view.label}
                  </button>
                )
              })}
            </div>

            <div className="hidden md:flex items-center space-x-4">
              <button onClick={() => setIsCalcOpen(true)} className="flex items-center px-6 py-3 bg-white border border-[#E2DCD0] shadow-sm rounded-full text-[#4A3B32] font-bold hover:scale-[1.02] hover:shadow-md transition-all duration-300">
                <Calculator size={20} className="mr-2 text-[#C75D4E]" /> 計算機
              </button>
            </div>
          </div>

          <div className="flex flex-1 p-3 md:p-6 lg:space-x-8 overflow-hidden relative">
            
            <div className="flex-1 flex flex-col bg-[#FCFAF5] rounded-[32px] md:rounded-[40px] shadow-[0_8px_30px_rgba(74,59,50,0.06)] border border-[#E2DCD0] overflow-hidden animate-in fade-in duration-500">
              
              {currentView === 'calendar' && (
                <div className="flex flex-col h-full animate-in slide-in-from-bottom-4 duration-300">
                  <div className="flex items-center justify-between p-6 md:p-8 border-b border-[#E2DCD0]">
                    <h2 className="text-4xl md:text-5xl font-black text-[#4A3B32] tracking-wide">
                      {currentMonthDate.getFullYear()}年 <span className="text-5xl md:text-6xl text-[#C75D4E] mx-1">{currentMonthDate.getMonth() + 1}</span>月
                    </h2>
                    <div className="flex space-x-2 md:space-x-4">
                      <button onClick={() => setCurrentMonthDate(new Date(currentMonthDate.getFullYear(), currentMonthDate.getMonth() - 1, 1))} className="p-3 md:p-4 bg-white border border-[#E2DCD0] shadow-sm rounded-full hover:scale-105 transition-all"><ChevronLeft size={24} className="text-[#4A3B32]"/></button>
                      <button onClick={() => setCurrentMonthDate(new Date(currentMonthDate.getFullYear(), currentMonthDate.getMonth() + 1, 1))} className="p-3 md:p-4 bg-white border border-[#E2DCD0] shadow-sm rounded-full hover:scale-105 transition-all"><ChevronRight size={24} className="text-[#4A3B32]"/></button>
                    </div>
                  </div>
                  <div className="grid grid-cols-7 border-b border-[#E2DCD0] bg-[#F4F0EA]/50 shrink-0">
                    {DAYS_OF_WEEK.map(day => <div key={day} className="text-center py-4 text-sm md:text-xl font-black tracking-widest text-[#8C7A6B] uppercase">{day}</div>)}
                  </div>
                  
                  <div className="flex-1 grid grid-cols-7 grid-rows-5 overflow-y-auto custom-scrollbar bg-[#FCFAF5]">
                    {calendarData.map((dateStr, idx) => {

                    <button onClick={() => handleCalcInput('=')} className="w-14 h-14 md:w-16 md:h-16 rounded-full bg-[#4A3B32] shadow-md text-white text-3xl flex items-center justify-center active:scale-95 hover:bg-[#2C2420] transition-colors">=</button>
                  </div>
                  <button onClick={handleSaveRevenue} disabled={parseFloat(calcDisplay) <= 0 || calcDisplay === 'Error'} className="w-full mt-6 py-4 bg-[#C75D4E] disabled:bg-[#E2DCD0] text-white rounded-2xl font-black text-xl tracking-widest hover:brightness-110 active:scale-95 transition-all shadow-md disabled:shadow-none">
                    加入營收
                  </button>
                </div>
              </div>
            </div>
          )}

          {isNewApptModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-black/20 backdrop-blur-sm" onClick={() => setIsNewApptModalOpen(false)}></div>
              <div className="relative bg-white rounded-[40px] w-full max-w-lg shadow-[0_20px_60px_rgba(74,59,50,0.1)] border border-[#E2DCD0] p-8 md:p-12 flex flex-col max-h-[90vh] animate-in slide-in-from-bottom-8 duration-300">
                <h2 className="text-4xl font-black mb-8 border-b border-[#E2DCD0] pb-6 shrink-0 text-[#4A3B32] tracking-widest">預約建檔</h2>
                <div className="flex-1 overflow-y-auto custom-scrollbar space-y-8 pr-2">
                  <div>
                    <label className="block text-sm font-bold tracking-widest uppercase text-[#8C7A6B] mb-3">顧客姓名 CLIENT NAME</label>
                    <div className="relative">
                      <input type="text" value={tempClientName} onChange={e => setTempClientName(e.target.value)} className="w-full bg-[#FCFAF5] border border-[#E2DCD0] rounded-2xl text-2xl font-black py-4 px-5 outline-none focus:bg-white focus:border-[#4A3B32] transition-colors shadow-inner text-[#4A3B32]" placeholder="輸入姓名..." autoFocus/>
                      {typingMatchedClient && <div className="absolute right-4 top-1/2 -translate-y-1/2 bg-[#4A3B32] text-white px-3 py-1.5 rounded-lg text-xs font-bold tracking-widest shadow-sm">舊客</div>}
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-6">
                    <div>
                      <label className="block text-sm font-bold tracking-widest uppercase text-[#8C7A6B] mb-3">時間 TIME</label>
                      <select value={tempTime} onChange={e => setTempTime(e.target.value)} className="w-full bg-[#FCFAF5] border border-[#E2DCD0] rounded-2xl text-xl font-black py-4 px-5 outline-none cursor-pointer shadow-inner text-[#4A3B32]">
                        {TIME_SLOTS.map(t => <option key={t} value={t}>{t}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-bold tracking-widest uppercase text-[#8C7A6B] mb-3">人數 PAX</label>
                      <input type="number" min="1" max="10" value={tempPax} onChange={e => setTempPax(parseInt(e.target.value)||1)} className="w-full bg-[#FCFAF5] border border-[#E2DCD0] rounded-2xl text-xl font-black py-4 px-5 outline-none focus:bg-white focus:border-[#4A3B32] transition-colors shadow-inner text-[#4A3B32]"/>
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-bold tracking-widest uppercase text-[#8C7A6B] mb-3">服務項目 SERVICE</label>
                    <select value={tempService} onChange={e => setTempService(e.target.value)} className="w-full bg-[#FCFAF5] border border-[#E2DCD0] rounded-2xl text-xl font-black py-4 px-5 outline-none cursor-pointer shadow-inner text-[#4A3B32]">
                      {storeItems.filter(i => i.type === 'service').map(s => <option key={s.id} value={s.name}>{s.name} (${s.price})</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-bold tracking-widest uppercase text-[#8C7A6B] mb-3">備註 NOTES (選填)</label>
                    <input type="text" value={tempNotes} onChange={e => setTempNotes(e.target.value)} className="w-full bg-[#FCFAF5] border border-[#E2DCD0] rounded-2xl text-lg font-bold py-4 px-5 outline-none focus:bg-white focus:border-[#4A3B32] transition-colors shadow-inner text-[#4A3B32]" placeholder="例如: 指定設計師..."/>
                  </div>
                </div>
                <div className="shrink-0 pt-8 mt-4 border-t border-[#E2DCD0]">
                  <button onClick={handleSaveAppt} disabled={!tempClientName} className="w-full py-5 bg-[#4A3B32] text-white rounded-2xl font-black text-xl tracking-widest shadow-md hover:-translate-y-1 transition-all disabled:opacity-50 disabled:hover:translate-y-0 disabled:shadow-none">
                    確認建檔
                  </button>
                </div>
              </div>
            </div>
          )}

          {isClientModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-black/20 backdrop-blur-sm" onClick={() => setIsClientModalOpen(false)}></div>
              <div className="relative bg-white rounded-[40px] w-full max-w-lg shadow-[0_20px_60px_rgba(74,59,50,0.1)] border border-[#E2DCD0] p-8 md:p-12 flex flex-col max-h-[90vh] animate-in slide-in-from-bottom-8 duration-300">
                <h2 className="text-4xl font-black mb-8 border-b border-[#E2DCD0] pb-6 shrink-0 text-[#4A3B32] tracking-widest">
                  {tempClientData.id ? '編輯顧客' : '新增顧客'}
                </h2>
                <div className="flex-1 overflow-y-auto space-y-8 custom-scrollbar pr-2">
                  <div>
                    <label className="block text-sm font-bold tracking-widest uppercase text-[#8C7A6B] mb-3">姓名 NAME</label>
                    <input type="text" value={tempClientData.name} onChange={e => setTempClientData({...tempClientData, name:e.target.value})} className="w-full bg-[#FCFAF5] border border-[#E2DCD0] rounded-2xl text-2xl font-black py-4 px-5 outline-none focus:bg-white focus:border-[#4A3B32] transition-colors shadow-inner text-[#4A3B32]" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold tracking-widest uppercase text-[#8C7A6B] mb-3">電話 PHONE</label>
                    <input type="tel" value={tempClientData.phone} onChange={e => setTempClientData({...tempClientData, phone:e.target.value})} className="w-full bg-[#FCFAF5] border border-[#E2DCD0] rounded-2xl text-xl font-bold py-4 px-5 outline-none focus:bg-white focus:border-[#4A3B32] transition-colors shadow-inner text-[#4A3B32]" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold tracking-widest uppercase text-[#8C7A6B] mb-3">喜好 PREFERENCE</label>
                    <textarea value={tempClientData.preference} onChange={e => setTempClientData({...tempClientData, preference:e.target.value})} className="w-full bg-[#FCFAF5] border border-[#E2DCD0] rounded-2xl text-lg font-bold py-4 px-5 outline-none focus:bg-white focus:border-[#4A3B32] min-h-[140px] transition-colors shadow-inner text-[#4A3B32]" />
                  </div>
                </div>
                <div className="shrink-0 pt-8 mt-4 border-t border-[#E2DCD0]">
                  <button onClick={handleSaveClient} disabled={!tempClientData.name} className="w-full py-5 bg-[#4A3B32] text-white rounded-2xl font-black text-xl tracking-widest shadow-md hover:-translate-y-1 transition-all disabled:opacity-50 disabled:hover:translate-y-0 disabled:shadow-none">
                    儲存 SAVE
                  </button>
                </div>
              </div>
            </div>
          )}

          {isItemModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-black/20 backdrop-blur-sm" onClick={() => setIsItemModalOpen(false)}></div>
              <div className="relative bg-white rounded-[40px] w-full max-w-sm shadow-[0_20px_60px_rgba(74,59,50,0.1)] border border-[#E2DCD0] p-8 md:p-10 flex flex-col animate-in zoom-in-95 duration-300">
                <h2 className="text-3xl font-black mb-8 border-b border-[#E2DCD0] pb-4 text-[#4A3B32] tracking-widest">新增項目</h2>
                <div className="space-y-6">
                  <div>
                    <label className="block text-sm font-bold tracking-widest uppercase text-[#8C7A6B] mb-2">類別 TYPE</label>
                    <select value={tempItemData.type} onChange={e => setTempItemData({...tempItemData, type:e.target.value})} className="w-full bg-[#FCFAF5] border border-[#E2DCD0] rounded-xl text-lg font-bold py-3 px-4 outline-none cursor-pointer text-[#4A3B32]">
                      <option value="service">美髮服務</option>
                      <option value="product">店內商品</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-bold tracking-widest uppercase text-[#8C7A6B] mb-2">名稱 NAME</label>
                    <input type="text" value={tempItemData.name} onChange={e => setTempItemData({...tempItemData, name:e.target.value})} className="w-full bg-[#FCFAF5] border border-[#E2DCD0] rounded-xl text-xl font-black py-3 px-4 outline-none focus:border-[#4A3B32] text-[#4A3B32]" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold tracking-widest uppercase text-[#8C7A6B] mb-2">價格 PRICE</label>
                    <input type="number" value={tempItemData.price} onChange={e => setTempItemData({...tempItemData, price:e.target.value})} className="w-full bg-[#FCFAF5] border border-[#E2DCD0] rounded-xl text-xl font-black py-3 px-4 outline-none focus:border-[#4A3B32] text-[#4A3B32]" />
                  </div>
                  {tempItemData.type === 'service' && (
                    <div>
                      <label className="block text-sm font-bold tracking-widest uppercase text-[#8C7A6B] mb-2">預估時間 DURATION (選填)</label>
                      <input type="text" placeholder="例如: 1 HR" value={tempItemData.duration} onChange={e => setTempItemData({...tempItemData, duration:e.target.value})} className="w-full bg-[#FCFAF5] border border-[#E2DCD0] rounded-xl text-lg font-bold py-3 px-4 outline-none focus:border-[#4A3B32] text-[#4A3B32]" />
                    </div>
                  )}
                </div>
                <div className="pt-10">
                  <button onClick={handleSaveStoreItem} disabled={!tempItemData.name || !tempItemData.price} className="w-full py-4 bg-[#4A3B32] text-white rounded-2xl font-black text-lg hover:-translate-y-1 transition-all disabled:opacity-50 disabled:hover:translate-y-0 shadow-md">
                    確認新增
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
